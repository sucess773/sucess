<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito | SUCESS</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f5f5f5;
font-family:Poppins,sans-serif;
}

main{
max-width:1100px;
margin:40px auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.item{
display:flex;
align-items:center;
background:#fff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.item img{
width:120px;
height:120px;
object-fit:cover;
border-radius:12px;
margin-right:20px;
}

.info{
flex:1;
}

.info h3{
margin-bottom:10px;
}

.precio{
font-size:22px;
font-weight:bold;
color:#16a34a;
}

.acciones{
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

button{

padding:15px 30px;

border:none;

border-radius:40px;

cursor:pointer;

font-size:16px;

font-weight:bold;

}

.vaciar{

background:#dc2626;

color:white;

}

.whatsapp{

background:#16a34a;

color:white;

text-decoration:none;

padding:15px 30px;

border-radius:40px;

font-weight:bold;

display:inline-block;

}

.total{

margin-top:30px;

font-size:30px;

font-weight:bold;

text-align:right;

}

</style>

</head>

<body>

<header>

<div class="logo">

<a href="index.html">

<img src="assets/logo.png">

</a>

</div>

<nav>

<a href="index.html">Inicio</a>

<a href="catalogo.html">Catálogo</a>

<a href="carrito.html">Carrito</a>

</nav>

</header>

<main>

<h1>Mi Carrito</h1>

<div id="lista"></div>

<div class="total" id="total"></div>

<div class="acciones">

<button class="vaciar" onclick="vaciar()">
Vaciar carrito
</button>

<a
id="comprar"
class="whatsapp"
target="_blank">
Comprar por WhatsApp
</a>

</div>

</main>

<script src="js/carrito.js"></script>

<script>

const lista=document.getElementById("lista");

const total=document.getElementById("total");

const comprar=document.getElementById("comprar");

function cargar(){

const carrito=obtenerCarrito();

lista.innerHTML="";

let suma=0;

let mensaje="Hola, deseo comprar:%0A%0A";

carrito.forEach(p=>{

suma+=Number(p.precio);

mensaje+=`• ${p.nombre} - S/ ${p.precio}%0A`;

lista.innerHTML+=`

<div class="item">

<img src="${p.imagen}">

<div class="info">

<h3>${p.nombre}</h3>

<div class="precio">

S/ ${p.precio}

</div>

</div>

</div>

`;

});

mensaje+=`%0ATotal: S/ ${suma.toFixed(2)}`;

comprar.href=`https://wa.me/51992718707?text=${mensaje}`;

total.innerHTML=`Total: <span style="color:#16a34a">S/ ${suma.toFixed(2)}</span>`;

}

function vaciar(){

vaciarCarrito();

cargar();

}

cargar();

</script>

</body>

</html>
