<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Administrador | SUCESS</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f4f4f4;
font-family:Poppins,sans-serif;
}

main{

max-width:900px;

margin:auto;

padding:40px;

}

h1{

text-align:center;

margin-bottom:30px;

}

form{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

input,select{

width:100%;

padding:15px;

margin-bottom:18px;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

}

button{

background:#111;

color:white;

padding:15px;

border:none;

border-radius:40px;

cursor:pointer;

width:100%;

font-size:16px;

font-weight:bold;

}

button:hover{

background:#d62828;

}

</style>

</head>

<body>

<header>

<div class="logo">

<a href="index.html">

<img src="assets/logo.png">

</a>

</div>

<nav>

<a href="index.html">Inicio</a>

<a href="catalogo.html">Catálogo</a>

<a href="admin.html">Administrador</a>

</nav>

</header>

<main>

<h1>Administrador SUCESS</h1>

<form id="formulario">

<input
id="nombre"
placeholder="Nombre del producto"
required>

<input
id="precio"
type="number"
placeholder="Precio"
required>

<select id="categoria">

<option>Panini</option>

<option>Tres Reyes</option>

</select>

<input
id="imagen"
placeholder="Ruta de la imagen">

<button>

Guardar producto

</button>

</form>

</main>

<script src="js/admin.js"></script>

</body>

</html>
